<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>グレゴリオ製菓 名刺メーカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda+SC:wght@600;700&family=Inter:wght@500;700;850&family=Noto+Sans+JP:wght@400;500;700;850&family=Noto+Serif+JP:wght@500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #25252a;
      --muted: #686a73;
      --paper: #f6f4f0;
      --panel: #fffdf9;
      --line: #ddd4c5;
      --gold: #c0835b;
      --shadow: 0 18px 46px rgba(37, 31, 26, 0.14);
      --font-ui: "Noto Sans JP", "Yu Gothic UI", "Yu Gothic", sans-serif;
      font-family: var(--font-ui);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: #efe9df;
    }

    main {
      width: min(1360px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(27px, 4vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .link-pill {
      flex: 0 0 auto;
      border: 1px solid rgba(83, 70, 52, 0.18);
      background: rgba(255, 253, 249, 0.9);
      border-radius: 999px;
      color: #4d4233;
      font-size: 13px;
      font-weight: 800;
      padding: 8px 12px;
      text-decoration: none;
    }

    .top-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .panel,
    .preview-panel {
      background: rgba(255, 253, 249, 0.94);
      border: 1px solid rgba(221, 212, 197, 0.94);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      position: sticky;
      top: 14px;
      max-height: calc(100vh - 28px);
      overflow: auto;
      padding: 16px;
    }

    .preview-panel {
      min-width: 0;
      padding: 18px;
    }

    .control-section {
      display: grid;
      gap: 12px;
      padding: 0 0 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(221, 212, 197, 0.72);
    }

    .control-section:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .control-section h2 {
      margin: 0;
      font-size: 15px;
    }

    .tab-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 16px;
    }

    .tab-button {
      min-height: 38px;
      border: 1px solid #cfc5b4;
      background: #fff;
      color: #4d4233;
      font-size: 13px;
      font-weight: 850;
      padding: 8px 6px;
    }

    .tab-button.is-active {
      border-color: #7e553b;
      background: #24242a;
      color: #fff;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.is-active {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
    }

    label,
    .field-label {
      color: #3d3d43;
      font-size: 12px;
      font-weight: 800;
    }

    input,
    select {
      width: 100%;
      min-height: 39px;
      border: 1px solid #cfc5b4;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      padding: 8px 10px;
    }

    input[type="range"] {
      min-height: auto;
      padding: 0;
      accent-color: #8d6246;
    }

    input[type="color"] {
      min-height: 39px;
      padding: 4px;
      cursor: pointer;
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(192, 131, 91, 0.22);
      border-color: #9d6d4d;
    }

    .color-settings {
      border: 1px solid rgba(207, 197, 180, 0.92);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.56);
      overflow: hidden;
    }

    .color-settings summary {
      min-height: 42px;
      padding: 11px 12px;
      color: #3d3d43;
      cursor: pointer;
      font-size: 13px;
      font-weight: 850;
      list-style-position: inside;
    }

    .color-settings[open] summary {
      border-bottom: 1px solid rgba(207, 197, 180, 0.72);
    }

    .color-settings-body {
      display: grid;
      gap: 12px;
      padding: 12px;
    }

    .color-control {
      display: grid;
      gap: 8px;
    }

    .color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .color-swatch {
      width: 28px;
      min-height: 28px;
      border: 1px solid rgba(61, 61, 67, 0.18);
      border-radius: 999px;
      background: var(--swatch-color);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
      padding: 0;
    }

    .color-swatch.is-active {
      outline: 2px solid rgba(126, 85, 59, 0.42);
      outline-offset: 2px;
    }

    .color-inputs {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .logo-color-settings {
      margin-top: 12px;
    }

    .logo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      max-height: 650px;
      overflow: auto;
      padding-right: 2px;
    }

    .logo-choice {
      display: block;
      min-width: 0;
      border: 1px solid #d9d0c2;
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
      padding: 8px;
      min-height: 170px;
      cursor: pointer;
    }

    .logo-choice.is-selected {
      border-color: #7e553b;
      box-shadow: 0 0 0 2px rgba(126, 85, 59, 0.15);
    }

    .logo-thumb {
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 4px;
      background: #fff;
    }

    .logo-choice img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .sub-logo-grid {
      max-height: 420px;
      margin-top: 10px;
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .category-button {
      min-height: 34px;
      border: 1px solid #cfc5b4;
      background: #fff;
      color: #4d4233;
      font-size: 12px;
      font-weight: 850;
      padding: 6px 9px;
    }

    .category-button.is-active {
      border-color: #7e553b;
      background: #7e553b;
      color: #fff;
    }

    .panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-top: 16px;
      margin-top: 16px;
      border-top: 1px solid rgba(221, 212, 197, 0.72);
    }

    .panel-actions .wide {
      grid-column: 1 / -1;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: #24242a;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 850;
      padding: 9px 12px;
    }

    button.secondary {
      border: 1px solid #cfc5b4;
      background: #fff;
      color: var(--ink);
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
    }

    .preview-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .preview-size {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .preview-scroll {
      overflow: auto;
      padding: 18px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
    }

    .business-card {
      --logo-size: 206px;
      --logo-x: 0px;
      --logo-y: 0px;
      --brand-font: "Noto Serif JP";
      --tagline-font: "Times New Roman";
      --school-font: "Times New Roman";
      --name-font: "Noto Serif JP";
      --id-font: "Times New Roman";
      --brand-color: #000000;
      --tagline-color: #141414;
      --school-color: #000000;
      --name-color: #141414;
      --id-color: #141414;
      --halo-fill: #111111;
      --halo-stroke: #d8bd8d;
      --sub-logo-size: 120px;
      --sub-logo-x: 0px;
      --sub-logo-y: 0px;
      --card-aspect: 1496 / 2800;
      position: relative;
      width: min(100%, 460px);
      aspect-ratio: var(--card-aspect);
      margin: 0 auto;
      overflow: hidden;
      container-type: inline-size;
      color: #141414;
      background: #f3f2ef;
      isolation: isolate;
    }

    .business-card > img,
    .business-card > svg {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .card-inner {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .logo-wrap {
      position: absolute;
      left: calc(50% + var(--logo-x));
      top: calc(19.2% + var(--logo-y));
      width: var(--logo-size);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      overflow: visible;
    }

    .logo-wrap img,
    .logo-halo,
    .sub-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .logo-wrap img,
    .logo-halo {
      grid-area: 1 / 1;
    }

    .logo-halo {
      z-index: 2;
      pointer-events: none;
      overflow: visible;
    }

    .logo-halo-fill {
      fill: var(--halo-fill);
    }

    .logo-halo-outline {
      fill: none;
      stroke: var(--halo-stroke);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 4;
    }

    .sub-logo-wrap {
      position: absolute;
      left: calc(50% + var(--sub-logo-x));
      top: calc(50% + var(--sub-logo-y));
      width: var(--sub-logo-size);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      z-index: 3;
    }

    .brand-text,
    .tagline,
    .school,
    .person-name,
    .person-id {
      position: absolute;
      left: 8%;
      right: 8%;
      text-align: center;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .brand-text {
      top: 45.7%;
      color: var(--brand-color);
      font-family: var(--brand-font), "Noto Serif JP", "Yu Mincho", serif;
      font-size: 8.6cqw;
      font-weight: 700;
      line-height: 1.1;
    }

    .tagline {
      top: 53.9%;
      color: var(--tagline-color);
      font-family: var(--tagline-font), Georgia, serif;
      font-size: 4.55cqw;
      font-weight: 500;
      line-height: 1.15;
    }

    .school {
      top: 79.3%;
      color: var(--school-color);
      font-family: var(--school-font), Georgia, serif;
      font-size: 5.7cqw;
      font-weight: 700;
      line-height: 1.1;
    }

    .person-name {
      top: 84.8%;
      color: var(--name-color);
      font-family: var(--name-font), "Noto Serif JP", "Yu Mincho", serif;
      font-size: 8.8cqw;
      font-weight: 900;
      line-height: 1.12;
    }

    .person-id {
      top: 59.7%;
      color: var(--id-color);
      font-family: var(--id-font), Georgia, serif;
      font-size: 5.2cqw;
      font-weight: 600;
      line-height: 1.12;
    }

    .export-host {
      position: fixed;
      left: -200vw;
      top: 0;
      width: 1px;
      height: 1px;
      pointer-events: none;
    }

    @media (max-width: 1040px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 620px) {
      main {
        width: min(100% - 18px, 520px);
        padding-top: 18px;
      }

      .topbar,
      .preview-head {
        display: grid;
      }

      .top-links {
        justify-content: flex-start;
      }

      .field-row,
      .panel-actions {
        grid-template-columns: 1fr;
      }

      .logo-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview-scroll {
        padding: 10px;
      }
    }

    @media (max-width: 420px) {
      .logo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>グレゴリオ製菓 名刺メーカー</h1>
        <p class="subtitle">サンプル名刺をベースに、名前・ID・フォント・ロゴ候補を切り替えて画像化できます。</p>
      </div>
      <div class="top-links" aria-label="関連ページ">
        <a class="link-pill" href="usage.html">使い方</a>
        <a class="link-pill" href="logo-candidate-review.html">ロゴ候補を見る</a>
      </div>
    </div>

    <div class="workspace">
      <section class="panel" aria-label="名刺編集">
        <div class="tab-list" role="tablist" aria-label="編集カテゴリ">
          <button class="tab-button is-active" type="button" role="tab" aria-selected="true" aria-controls="tab-size" data-tab="size">ロゴ配置</button>
          <button class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tab-text" data-tab="text">テキスト/フォント</button>
          <button class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tab-logo" data-tab="logo">ロゴ選択</button>
        </div>

        <div class="tab-panel is-active" id="tab-size" role="tabpanel" data-tab-panel="size">
          <div class="control-section">
            <h2>主ロゴ配置</h2>
            <div class="field-row">
              <div class="field">
                <label for="ratioSelect">比率</label>
                <select id="ratioSelect">
                  <option value="sample">サンプル縦長</option>
                  <option value="standard">標準名刺サイズ</option>
                </select>
              </div>
              <div class="field">
                <label for="logoVisible">ロゴ</label>
                <select id="logoVisible">
                  <option value="show">表示</option>
                  <option value="hide">非表示</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="logoSize">ロゴサイズ</label>
              <input id="logoSize" type="range" min="120" max="320" value="186">
            </div>
            <div class="field-row">
              <div class="field">
                <label for="logoX">ロゴ左右</label>
                <input id="logoX" type="range" min="-120" max="120" value="0">
              </div>
              <div class="field">
                <label for="logoY">ロゴ上下</label>
                <input id="logoY" type="range" min="-70" max="90" value="28">
              </div>
            </div>
          </div>

          <div class="control-section">
            <h2>サブロゴ配置</h2>
            <div class="field-row">
              <div class="field">
                <label for="subLogoVisible">サブロゴ</label>
                <select id="subLogoVisible">
                  <option value="hide">非表示</option>
                  <option value="show">表示</option>
                </select>
              </div>
              <div class="field">
                <label for="subLogoSize">サブロゴサイズ</label>
                <input id="subLogoSize" type="range" min="40" max="220" value="120">
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="subLogoX">サブロゴ左右</label>
                <input id="subLogoX" type="range" min="-260" max="260" value="0">
              </div>
              <div class="field">
                <label for="subLogoY">サブロゴ上下</label>
                <input id="subLogoY" type="range" min="-620" max="620" value="240">
              </div>
            </div>
          </div>

          <div class="control-section">
            <h2>光輪設定</h2>
            <div class="field">
              <label for="logoHaloVisible">主ロゴに光輪を追加</label>
              <select id="logoHaloVisible">
                <option value="hide">非表示</option>
                <option value="show">表示</option>
              </select>
            </div>
            <details class="color-settings logo-color-settings">
              <summary>光輪の色設定</summary>
              <div class="color-settings-body" id="logoHaloSettings"></div>
            </details>
          </div>
        </div>

        <div class="tab-panel" id="tab-text" role="tabpanel" data-tab-panel="text">
          <div class="control-section">
            <h2>テキスト</h2>
            <div class="field">
              <label for="brandText">サークル名</label>
              <input id="brandText" maxlength="24" value="グレゴリオ製菓">
            </div>
            <div class="field">
              <label for="taglineText">英字コピー</label>
              <input id="taglineText" maxlength="48" value="Sweet times with Gregorio">
            </div>
            <div class="field-row">
              <div class="field">
                <label for="idText">ID</label>
                <input id="idText" maxlength="24" value="ID: 128091">
              </div>
              <div class="field">
                <label for="schoolText">所属表記</label>
                <input id="schoolText" maxlength="24" value="S.C.H.A.L.E">
              </div>
            </div>
            <div class="field">
              <label for="nameText">名前</label>
              <input id="nameText" maxlength="20" value="先生名">
            </div>
          </div>

          <div class="control-section">
            <h2>フォント</h2>
            <div class="field">
              <label for="brandFont">サークル名</label>
              <select id="brandFont" data-font-target="brand"></select>
            </div>
            <div class="field">
              <label for="taglineFont">英字コピー</label>
              <select id="taglineFont" data-font-target="tagline"></select>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="idFont">ID</label>
                <select id="idFont" data-font-target="id"></select>
              </div>
              <div class="field">
                <label for="schoolFont">所属表記</label>
                <select id="schoolFont" data-font-target="school"></select>
              </div>
            </div>
            <div class="field">
              <label for="nameFont">名前</label>
              <select id="nameFont" data-font-target="name"></select>
            </div>
          </div>

          <div class="control-section">
            <details class="color-settings">
              <summary>色設定</summary>
              <div class="color-settings-body" id="colorSettings"></div>
            </details>
          </div>
        </div>

        <div class="tab-panel" id="tab-logo" role="tabpanel" data-tab-panel="logo">
          <div class="control-section">
            <h2>ロゴ選択</h2>
            <div class="category-tabs" id="logoCategories" aria-label="ロゴカテゴリ"></div>
            <div class="logo-grid" id="logoGrid"></div>
          </div>
          <div class="control-section">
            <h2>サブロゴ選択</h2>
            <div class="logo-grid sub-logo-grid" id="subLogoGrid"></div>
            <details class="color-settings logo-color-settings">
              <summary>サブロゴの色設定</summary>
              <div class="color-settings-body" id="subLogoSettings"></div>
            </details>
          </div>
        </div>

        <div class="panel-actions" aria-label="保存と初期化">
          <button id="downloadPng" type="button">PNG保存</button>
          <button id="downloadSvg" class="secondary" type="button">SVG保存</button>
          <button id="resetSettings" class="secondary wide" type="button">設定を初期化</button>
        </div>
        <p class="note">保存画像は選択中の比率で書き出します。GitHub Pages上では選択ロゴをSVG内に埋め込んでからPNG化します。</p>
      </section>

      <section class="preview-panel" aria-label="名刺プレビュー">
        <div class="preview-head">
          <h2>プレビュー</h2>
          <div class="preview-size" id="previewSize">1496 x 2800</div>
        </div>
        <div class="preview-scroll">
          <article class="business-card" id="businessCard" data-ratio="sample"></article>
        </div>
      </section>
    </div>
  </main>

  <div class="export-host" id="exportHost" aria-hidden="true"></div>

  <script>
    const subLogoFile = "assets/logo/連邦捜査部ロゴ_copyright_Nexon,Yostar.png";

    const subLogoFiles = [
      "assets/logo/連邦捜査部ロゴ_copyright_Nexon,Yostar.png",
      "assets/sub_logo/シャーレ.svg",
      "assets/sub_logo/シャーレ_ハンコ.png"
    ];

    const logoFiles = [
      "cake-ornate-01.png", "cake-ornate-02.png", "cake-ornate-03.png", "cake-ornate-04.png",

    function recolorSubLogoSvg(markup) {
      return markup
        .replace(/<\?xml[\s\S]*?\?>/gi, "")
        .replace(/<!DOCTYPE[\s\S]*?>/gi, "")
        .replace(/rgb\(79,\s*43,\s*50\)/gi, subLogoValues.primary)
        .replace(/#4f2b32/gi, subLogoValues.primary);

    function svgViewBox(markup) {
      const match = markup.match(/viewBox="([^"]+)"/i);
      return match ? match[1] : "0 0 1 1";
    }

    function svgInner(markup) {
      return markup
        .replace(/^[\s\S]*?<svg\b[^>]*>/i, "")
        .replace(/<\/svg>\s*$/i, "");
    }

    function normalizeHex(value) {
      const raw = String(value).trim();
      const match = raw.match(/^#?([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/);
      if (!match) {
        return null;
      }
      const hex = match[1];
      if (hex.length === 3) {
        return `#${hex.split("").map((char) => char + char).join("")}`.toLowerCase();
      }
      return `#${hex}`.toLowerCase();
    }

    async function renderPreviewSvg() {
      const renderId = ++previewRenderId;
      try {
        const markup = await svgMarkup();
        if (renderId === previewRenderId) {
          const previousObjectUrl = previewObjectUrl;
          const nextObjectUrl = URL.createObjectURL(new Blob([markup], { type: "image/svg+xml;charset=utf-8" }));
          const image = new Image();
          image.alt = "名刺プレビュー";
          image.onload = () => {
            if (renderId !== previewRenderId) {
              URL.revokeObjectURL(nextObjectUrl);
              return;
            }
            previewObjectUrl = nextObjectUrl;
            card.replaceChildren(image);
            if (previousObjectUrl) {
              URL.revokeObjectURL(previousObjectUrl);
            }
          };
          image.onerror = () => {
            URL.revokeObjectURL(nextObjectUrl);
            if (renderId === previewRenderId) {
              card.innerHTML = markup;
            }
          };
          image.src = nextObjectUrl;
        }
      } catch (error) {
        console.error(error);
      }
    }

    function escapeXml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function imageToDataUrl(src) {
      try {
        const response = await fetch(src);
        const blob = await response.blob();
        return await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      } catch (error) {
        return await new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = image.naturalWidth;
            canvas.height = image.naturalHeight;
            canvas.getContext("2d").drawImage(image, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          };
          image.onerror = reject;
          image.src = src;
        });
      }
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    async function imageAsset(src) {
      const href = await imageToDataUrl(src);
      const image = await loadImage(href);
      return {
        href,
        width: image.naturalWidth || 1,
        height: image.naturalHeight || 1
      };
    }

    async function optionalImageAsset(src) {
      try {
        return await imageAsset(src);
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    function hexToRgb(value) {
      const normalized = normalizeHex(value) || "#000000";
      return {
        r: parseInt(normalized.slice(1, 3), 16),
        g: parseInt(normalized.slice(3, 5), 16),
        b: parseInt(normalized.slice(5, 7), 16)
      };
    }

    async function tintedImageAsset(src, color) {
      const image = await loadImage(src);
      const canvas = document.createElement("canvas");
      canvas.width = image.naturalWidth || 1;
      canvas.height = image.naturalHeight || 1;
      const context = canvas.getContext("2d");
      context.drawImage(image, 0, 0);
      const pixels = context.getImageData(0, 0, canvas.width, canvas.height);
      const rgb = hexToRgb(color);
      for (let index = 0; index < pixels.data.length; index += 4) {
        const alpha = pixels.data[index + 3];
        const isWhite = pixels.data[index] > 235 && pixels.data[index + 1] > 235 && pixels.data[index + 2] > 235;
        if (alpha && !isWhite) {
          pixels.data[index] = rgb.r;
          pixels.data[index + 1] = rgb.g;
          pixels.data[index + 2] = rgb.b;
        }
      }
      context.putImageData(pixels, 0, 0);
      return {
        href: canvas.toDataURL("image/png"),
        width: canvas.width,
        height: canvas.height
      };
    }

    async function optionalTintedImageAsset(src, color) {
      try {
        return await tintedImageAsset(src, color);
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    function containedImageMarkup(asset, centerX, centerY, boxSize) {
      const ratio = asset.width / asset.height;
      const width = ratio >= 1 ? boxSize : boxSize * ratio;
      const height = ratio >= 1 ? boxSize / ratio : boxSize;
      return `<image href="${asset.href}" x="${centerX - width / 2}" y="${centerY - height / 2}" width="${width}" height="${height}"/>`;
    }

    function containedSvgMarkup(markup, centerX, centerY, boxSize) {
      const viewBox = svgViewBox(markup);
      const parts = viewBox.trim().split(/\s+/).map(Number);
      const ratio = parts.length === 4 && parts[3] ? parts[2] / parts[3] : 1;
      const width = ratio >= 1 ? boxSize : boxSize * ratio;
      const height = ratio >= 1 ? boxSize / ratio : boxSize;
      return `<svg xmlns="http://www.w3.org/2000/svg" x="${centerX - width / 2}" y="${centerY - height / 2}" width="${width}" height="${height}" viewBox="${escapeXml(viewBox)}" overflow="visible" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">${svgInner(markup)}</svg>`;
    }

    function textStyle(font, size, weight, fill = "#141414") {
      return `font-family:'${font}', 'Noto Serif JP', serif;font-size:${size}px;font-weight:${weight};fill:${fill};text-anchor:middle;dominant-baseline:middle`;
    }

    async function svgMarkup() {
      await waitForFonts();
      const spec = ratioSpecs[fields.ratio.value];
      const scale = spec.width / previewBaseWidth;
      const logoSize = scaledPreviewPx(fields.logoSize.value, spec);
      const logoX = scaledPreviewPx(fields.logoX.value, spec);
      const logoY = scaledPreviewPx(fields.logoY.value, spec);
      const subLogoSize = scaledPreviewPx(fields.subLogoSize.value, spec);
      const subLogoX = scaledPreviewPx(fields.subLogoX.value, spec);
      const subLogoY = subLogoYOffsetPreviewPx() * scale;
      const centerX = spec.width / 2;
      const logoCenterX = centerX + logoX;
      const logoCenterY = spec.height * 0.192 + logoY;
      const subLogoCenterX = centerX + subLogoX;
      const subLogoCenterY = spec.height / 2 + subLogoY;
      const paper = `
        <defs>
          <linearGradient id="paperLight" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#fbfaf8"/>
            <stop offset="0.48" stop-color="#f2f1ee"/>
            <stop offset="1" stop-color="#eceae7"/>
          </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#paperLight)"/>
      `;
      let logo = "";
      if (fields.logoVisible.value === "show") {
        const logoAsset = await optionalImageAsset(logoPath(selectedLogo));
        if (logoAsset) {
          logo = containedImageMarkup(logoAsset, logoCenterX, logoCenterY, logoSize);
        }
        if (fields.logoHaloVisible.value === "show") {
          logo += `<svg x="${logoCenterX - logoSize / 2}" y="${logoCenterY - logoSize / 2}" width="${logoSize}" height="${logoSize}" viewBox="0 0 705 590" overflow="visible">${haloInnerMarkup()}</svg>`;
        }
      }
      let subLogo = "";
      if (fields.subLogoVisible.value === "show") {
        if (isSvgFile(selectedSubLogo)) {
          try {
            subLogo = containedSvgMarkup(await coloredSubLogoSvg(selectedSubLogo), subLogoCenterX, subLogoCenterY, subLogoSize);
          } catch (error) {
            console.error(error);
            const subLogoAsset = await optionalTintedImageAsset(logoPath(selectedSubLogo), subLogoValues.primary);
            if (subLogoAsset) {
              subLogo = containedImageMarkup(subLogoAsset, subLogoCenterX, subLogoCenterY, subLogoSize);
            }
          }
        } else {
          const subLogoAsset = await optionalImageAsset(logoPath(selectedSubLogo));
          if (subLogoAsset) {
            subLogo = containedImageMarkup(subLogoAsset, subLogoCenterX, subLogoCenterY, subLogoSize);
          }
        }
      }
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${spec.width}" height="${spec.height}" viewBox="0 0 ${spec.width} ${spec.height}">
        ${paper}
        ${logo}
        <text x="${centerX}" y="${spec.height * 0.457}" style="${textStyle(fields.brandFont.value, previewPxFromCqw(textSizeCqw.brand) * scale, 700, colorValues.brand)}">${escapeXml(fields.brand.value.trim() || defaultState.brand)}</text>
        <text x="${centerX}" y="${spec.height * 0.539}" style="${textStyle(fields.taglineFont.value, previewPxFromCqw(textSizeCqw.tagline) * scale, 500, colorValues.tagline)}">${escapeXml(fields.tagline.value.trim() || defaultState.tagline)}</text>
        <text x="${centerX}" y="${spec.height * 0.793}" style="${textStyle(fields.schoolFont.value, previewPxFromCqw(textSizeCqw.school) * scale, 700, colorValues.school)}">${escapeXml(fields.school.value.trim() || defaultState.school)}</text>
        <text x="${centerX}" y="${spec.height * 0.848}" style="${textStyle(fields.nameFont.value, previewPxFromCqw(textSizeCqw.name) * scale, 900, colorValues.name)}">${escapeXml(fields.name.value.trim() || defaultState.name)}</text>
        <text x="${centerX}" y="${spec.height * 0.597}" style="${textStyle(fields.idFont.value, previewPxFromCqw(textSizeCqw.id) * scale, 600, colorValues.id)}">${escapeXml(fields.id.value.trim() || defaultState.id)}</text>
        ${subLogo}
      </svg>`;
    }

    function downloadBlob(content, type, filename) {
      const blob = content instanceof Blob ? content : new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.style.display = "none";
      document.body.append(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function waitForFonts() {
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
    }

    function fileBaseName() {
      const safeName = (fields.name.value.trim() || "teacher").replace(/[\\/:*?"<>|]/g, "_");
      return `gregorio-card-${safeName}-${fields.ratio.value}`;
    }

    async function downloadSvg() {
      try {
        downloadBlob(await svgMarkup(), "image/svg+xml;charset=utf-8", `${fileBaseName()}.svg`);
      } catch (error) {
        console.error(error);
        alert("SVG保存に失敗しました。ロゴ画像の読み込み状態を確認してください。");
      }
    }

    async function downloadPng() {
      try {
        const spec = ratioSpecs[fields.ratio.value];
        const markup = await svgMarkup();
        const url = URL.createObjectURL(new Blob([markup], { type: "image/svg+xml;charset=utf-8" }));
        const image = new Image();
        image.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = spec.width;
          canvas.height = spec.height;
          canvas.getContext("2d").drawImage(image, 0, 0);
          URL.revokeObjectURL(url);
          canvas.toBlob((blob) => {
            if (!blob) {
              alert("PNG保存に失敗しました。ブラウザで画像変換が完了しませんでした。");
              return;
            }
            downloadBlob(blob, "image/png", `${fileBaseName()}.png`);
          }, "image/png");
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          alert("PNG保存に失敗しました。保存用画像を読み込めませんでした。");
        };
        image.src = url;
      } catch (error) {
        console.error(error);
        alert("PNG保存に失敗しました。ロゴ画像の読み込み状態を確認してください。");
      }
    }

    fillFontSelects();
    renderColorSettings();
    renderLogoHaloSettings();
    renderSubLogoSettings();
    renderLogoCategories();
    renderLogoGrid();
    renderSubLogoGrid();
    syncPreview();

    document.querySelectorAll("[data-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        const tab = button.dataset.tab;
        document.querySelectorAll("[data-tab]").forEach((tabButton) => {
          const isActive = tabButton.dataset.tab === tab;
          tabButton.classList.toggle("is-active", isActive);
          tabButton.setAttribute("aria-selected", String(isActive));
        });
        document.querySelectorAll("[data-tab-panel]").forEach((panel) => {
          panel.classList.toggle("is-active", panel.dataset.tabPanel === tab);
        });
      });
    });

    document.querySelectorAll("input, select").forEach((field) => {
      field.addEventListener("input", syncPreview);
      field.addEventListener("change", syncPreview);
    });

    logoGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-logo]");
      if (!button) {
        return;
      }
      selectedLogo = button.dataset.logo;
      syncPreview();
    });

    logoCategoriesNode.addEventListener("click", (event) => {
      const button = event.target.closest("[data-logo-category]");
      if (!button) {
        return;
      }
      activeLogoCategory = button.dataset.logoCategory;
      syncLogoCategories();
      renderLogoGrid();
    });

    subLogoGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-sub-logo]");
      if (!button) {
        return;
      }
      selectedSubLogo = button.dataset.subLogo;
      syncPreview();
    });

    colorSettingsNode.addEventListener("click", (event) => {
      const button = event.target.closest("[data-color-target]");
      if (!button) {
        return;
      }
      setColorValue(button.dataset.colorTarget, button.dataset.colorValue);
    });

    colorSettingsNode.addEventListener("input", (event) => {
      const picker = event.target.closest("[data-color-picker]");
      const hex = event.target.closest("[data-color-hex]");
      if (picker) {
        setColorValue(picker.dataset.colorPicker, picker.value);
      }
      if (hex) {
        const normalized = normalizeHex(hex.value);
        if (normalized) {
          colorValues[hex.dataset.colorHex] = normalized;
          colorSettingsNode.querySelector(`[data-color-picker="${hex.dataset.colorHex}"]`).value = normalized;
          syncPreview();
          syncColorControls();
        }
      }
    });

    colorSettingsNode.addEventListener("change", (event) => {
      const hex = event.target.closest("[data-color-hex]");
      if (!hex) {
        return;
      }
      const normalized = normalizeHex(hex.value);
      hex.value = normalized || colorValues[hex.dataset.colorHex];
      syncColorControls();
    });

    logoHaloSettingsNode.addEventListener("click", (event) => {
      const button = event.target.closest("[data-logo-halo-target]");
      if (!button) {
        return;
      }
      setLogoHaloValue(button.dataset.logoHaloTarget, button.dataset.logoHaloValue);
    });

    logoHaloSettingsNode.addEventListener("input", (event) => {
      const picker = event.target.closest("[data-logo-halo-picker]");
      const hex = event.target.closest("[data-logo-halo-hex]");
      if (picker) {
        setLogoHaloValue(picker.dataset.logoHaloPicker, picker.value);
      }
      if (hex) {
        const normalized = normalizeHex(hex.value);
        if (normalized) {
          logoHaloValues[hex.dataset.logoHaloHex] = normalized;
          logoHaloSettingsNode.querySelector(`[data-logo-halo-picker="${hex.dataset.logoHaloHex}"]`).value = normalized;
          syncPreview();
          syncLogoHaloControls();
        }
      }
    });

    logoHaloSettingsNode.addEventListener("change", (event) => {
      const hex = event.target.closest("[data-logo-halo-hex]");
      if (!hex) {
        return;
      }
      const normalized = normalizeHex(hex.value);
      hex.value = normalized || logoHaloValues[hex.dataset.logoHaloHex];
      syncLogoHaloControls();
    });

    subLogoSettingsNode.addEventListener("click", (event) => {
      const button = event.target.closest("[data-sub-logo-target]");
      if (!button) {
        return;
      }
      setSubLogoValue(button.dataset.subLogoTarget, button.dataset.subLogoValue);
    });

    subLogoSettingsNode.addEventListener("input", (event) => {
      const picker = event.target.closest("[data-sub-logo-picker]");
      const hex = event.target.closest("[data-sub-logo-hex]");
      if (picker) {
        setSubLogoValue(picker.dataset.subLogoPicker, picker.value);
      }
      if (hex) {
        const normalized = normalizeHex(hex.value);
        if (normalized) {
          subLogoValues[hex.dataset.subLogoHex] = normalized;
          subLogoSettingsNode.querySelector(`[data-sub-logo-picker="${hex.dataset.subLogoHex}"]`).value = normalized;
          updateSubLogoThumbs();
          syncPreview();
          syncSubLogoControls();
        }
      }
    });

    subLogoSettingsNode.addEventListener("change", (event) => {
      const hex = event.target.closest("[data-sub-logo-hex]");
      if (!hex) {
        return;
      }
      const normalized = normalizeHex(hex.value);
      hex.value = normalized || subLogoValues[hex.dataset.subLogoHex];
      syncSubLogoControls();
    });

    document.querySelector("#downloadSvg").addEventListener("click", downloadSvg);
    document.querySelector("#downloadPng").addEventListener("click", downloadPng);
    document.querySelector("#resetSettings").addEventListener("click", resetSettings);
  </script>
</body>
</html>
