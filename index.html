<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>グレゴリオ製菓 名刺メーカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda+SC:wght@600;700&family=Inter:wght@500;700;850&family=Noto+Sans+JP:wght@400;500;700;850&family=Noto+Serif+JP:wght@500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #25252a;
      --muted: #686a73;
      --paper: #f6f4f0;
      --panel: #fffdf9;
      --line: #ddd4c5;
      --gold: #c0835b;
      --shadow: 0 18px 46px rgba(37, 31, 26, 0.14);
      --font-ui: "Noto Sans JP", "Yu Gothic UI", "Yu Gothic", sans-serif;
      font-family: var(--font-ui);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: #efe9df;
    }

    main {
      width: min(1360px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(27px, 4vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .link-pill {
      flex: 0 0 auto;
      border: 1px solid rgba(83, 70, 52, 0.18);
      background: rgba(255, 253, 249, 0.9);
      border-radius: 999px;
      color: #4d4233;
      font-size: 13px;
      font-weight: 800;
      padding: 8px 12px;
      text-decoration: none;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .panel,
    .preview-panel {
      background: rgba(255, 253, 249, 0.94);
      border: 1px solid rgba(221, 212, 197, 0.94);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      position: sticky;
      top: 14px;
      max-height: calc(100vh - 28px);
      overflow: auto;
      padding: 16px;
    }

    .preview-panel {
      min-width: 0;
      padding: 18px;
    }

    .control-section {
      display: grid;
      gap: 12px;
      padding: 0 0 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(221, 212, 197, 0.72);
    }

    .control-section:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .control-section h2 {
      margin: 0;
      font-size: 15px;
    }

    .tab-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 16px;
    }

    .tab-button {
      min-height: 38px;
      border: 1px solid #cfc5b4;
      background: #fff;
      color: #4d4233;
      font-size: 13px;
      font-weight: 850;
      padding: 8px 6px;
    }

    .tab-button.is-active {
      border-color: #7e553b;
      background: #24242a;
      color: #fff;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.is-active {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
    }

    label,
    .field-label {
      color: #3d3d43;
      font-size: 12px;
      font-weight: 800;
    }

    input,
    select {
      width: 100%;
      min-height: 39px;
      border: 1px solid #cfc5b4;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      padding: 8px 10px;
    }

    input[type="range"] {
      min-height: auto;
      padding: 0;
      accent-color: #8d6246;
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(192, 131, 91, 0.22);
      border-color: #9d6d4d;
    }

    .logo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      max-height: 650px;
      overflow: auto;
      padding-right: 2px;
    }

    .logo-choice {
      display: block;
      min-width: 0;
      border: 1px solid #d9d0c2;
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
      padding: 8px;
      min-height: 170px;
      cursor: pointer;
    }

    .logo-choice.is-selected {
      border-color: #7e553b;
      box-shadow: 0 0 0 2px rgba(126, 85, 59, 0.15);
    }

    .logo-thumb {
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 4px;
      background: #fff;
    }

    .logo-choice img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .category-button {
      min-height: 34px;
      border: 1px solid #cfc5b4;
      background: #fff;
      color: #4d4233;
      font-size: 12px;
      font-weight: 850;
      padding: 6px 9px;
    }

    .category-button.is-active {
      border-color: #7e553b;
      background: #7e553b;
      color: #fff;
    }

    .panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-top: 16px;
      margin-top: 16px;
      border-top: 1px solid rgba(221, 212, 197, 0.72);
    }

    .panel-actions .wide {
      grid-column: 1 / -1;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: #24242a;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 850;
      padding: 9px 12px;
    }

    button.secondary {
      border: 1px solid #cfc5b4;
      background: #fff;
      color: var(--ink);
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
    }

    .preview-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .preview-size {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .preview-scroll {
      overflow: auto;
      padding: 18px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
    }

    .business-card {
      --logo-size: 206px;
      --logo-x: 0px;
      --logo-y: 0px;
      --brand-font: "Noto Serif JP";
      --tagline-font: "Times New Roman";
      --school-font: "Times New Roman";
      --name-font: "Noto Serif JP";
      --id-font: "Times New Roman";
      position: relative;
      width: min(100%, 460px);
      min-width: 320px;
      margin: 0 auto;
      overflow: hidden;
      container-type: inline-size;
      color: #141414;
      background:
        radial-gradient(circle at 28% 18%, rgba(255,255,255,0.86), transparent 24%),
        radial-gradient(circle at 72% 58%, rgba(216,214,210,0.26), transparent 28%),
        linear-gradient(115deg, rgba(255,255,255,0.5), transparent 31%),
        #f3f2ef;
      border: 1px solid rgba(46, 42, 38, 0.18);
      box-shadow: 0 16px 42px rgba(42, 36, 30, 0.18);
      isolation: isolate;
    }

    .business-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(32deg, rgba(84,75,66,0.045) 0 1px, transparent 1px 8px),
        linear-gradient(107deg, rgba(255,255,255,0.45) 0 1px, transparent 1px 11px);
      opacity: 0.42;
      mix-blend-mode: multiply;
      z-index: 0;
    }

    .business-card[data-ratio="sample"] {
      aspect-ratio: 748 / 1400;
    }

    .business-card[data-ratio="standard"] {
      aspect-ratio: 55 / 91;
    }

    .card-inner {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .logo-wrap {
      position: absolute;
      left: calc(50% + var(--logo-x));
      top: calc(19.2% + var(--logo-y));
      width: var(--logo-size);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand-text,
    .tagline,
    .school,
    .person-name,
    .person-id {
      position: absolute;
      left: 8%;
      right: 8%;
      text-align: center;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .brand-text {
      top: 45.7%;
      color: #4a4a4a;
      font-family: var(--brand-font), "Noto Serif JP", "Yu Mincho", serif;
      font-size: clamp(28px, 8.6cqw, 52px);
      font-weight: 700;
      line-height: 1.1;
    }

    .tagline {
      top: 53.9%;
      font-family: var(--tagline-font), Georgia, serif;
      font-size: clamp(17px, 4.55cqw, 28px);
      font-weight: 500;
      line-height: 1.15;
    }

    .school {
      top: 79.3%;
      color: #565656;
      font-family: var(--school-font), Georgia, serif;
      font-size: clamp(22px, 5.7cqw, 36px);
      font-weight: 700;
      line-height: 1.1;
    }

    .person-name {
      top: 84.8%;
      font-family: var(--name-font), "Noto Serif JP", "Yu Mincho", serif;
      font-size: clamp(30px, 8.8cqw, 54px);
      font-weight: 900;
      line-height: 1.12;
    }

    .person-id {
      top: 59.7%;
      font-family: var(--id-font), Georgia, serif;
      font-size: clamp(20px, 5.2cqw, 33px);
      font-weight: 600;
      line-height: 1.12;
    }

    .export-host {
      position: fixed;
      left: -200vw;
      top: 0;
      width: 1px;
      height: 1px;
      pointer-events: none;
    }

    @media (max-width: 1040px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 620px) {
      main {
        width: min(100% - 18px, 520px);
        padding-top: 18px;
      }

      .topbar,
      .preview-head {
        display: grid;
      }

      .field-row,
      .panel-actions {
        grid-template-columns: 1fr;
      }

      .logo-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview-scroll {
        padding: 10px;
      }
    }

    @media (max-width: 420px) {
      .logo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>グレゴリオ製菓 名刺メーカー</h1>
        <p class="subtitle">サンプル名刺をベースに、名前・ID・フォント・ロゴ候補を切り替えて画像化できます。</p>
      </div>
      <a class="link-pill" href="logo-candidate-review.html">ロゴ候補を見る</a>
    </div>

    <div class="workspace">
      <section class="panel" aria-label="名刺編集">
        <div class="tab-list" role="tablist" aria-label="編集カテゴリ">
          <button class="tab-button is-active" type="button" role="tab" aria-selected="true" aria-controls="tab-size" data-tab="size">サイズ/ロゴ移動</button>
          <button class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tab-text" data-tab="text">テキスト/フォント</button>
          <button class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="tab-logo" data-tab="logo">ロゴ選択</button>
        </div>

        <div class="tab-panel is-active" id="tab-size" role="tabpanel" data-tab-panel="size">
          <div class="control-section">
            <h2>サイズ/ロゴ移動</h2>
            <div class="field-row">
              <div class="field">
                <label for="ratioSelect">比率</label>
                <select id="ratioSelect">
                  <option value="sample">サンプル縦長</option>
                  <option value="standard">標準名刺サイズ</option>
                </select>
              </div>
              <div class="field">
                <label for="logoVisible">ロゴ</label>
                <select id="logoVisible">
                  <option value="show">表示</option>
                  <option value="hide">非表示</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="logoSize">ロゴサイズ</label>
              <input id="logoSize" type="range" min="120" max="320" value="206">
            </div>
            <div class="field-row">
              <div class="field">
                <label for="logoX">ロゴ左右</label>
                <input id="logoX" type="range" min="-120" max="120" value="0">
              </div>
              <div class="field">
                <label for="logoY">ロゴ上下</label>
                <input id="logoY" type="range" min="-70" max="90" value="0">
              </div>
            </div>
          </div>
        </div>

        <div class="tab-panel" id="tab-text" role="tabpanel" data-tab-panel="text">
          <div class="control-section">
            <h2>テキスト</h2>
            <div class="field">
              <label for="brandText">サークル名</label>
              <input id="brandText" maxlength="24" value="グレゴリオ製菓">
            </div>
            <div class="field">
              <label for="taglineText">英字コピー</label>
              <input id="taglineText" maxlength="48" value="Sweet times with Gregorio">
            </div>
            <div class="field">
              <label for="schoolText">所属表記</label>
              <input id="schoolText" maxlength="24" value="S.C.H.A.L.E">
            </div>
            <div class="field-row">
              <div class="field">
                <label for="nameText">名前</label>
                <input id="nameText" maxlength="20" value="先生名">
              </div>
              <div class="field">
                <label for="idText">ID</label>
                <input id="idText" maxlength="24" value="ID: 128091">
              </div>
            </div>
          </div>

          <div class="control-section">
            <h2>フォント</h2>
            <div class="field">
              <label for="brandFont">サークル名</label>
              <select id="brandFont" data-font-target="brand"></select>
            </div>
            <div class="field">
              <label for="taglineFont">英字コピー</label>
              <select id="taglineFont" data-font-target="tagline"></select>
            </div>
            <div class="field">
              <label for="schoolFont">所属表記</label>
              <select id="schoolFont" data-font-target="school"></select>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="nameFont">名前</label>
                <select id="nameFont" data-font-target="name"></select>
              </div>
              <div class="field">
                <label for="idFont">ID</label>
                <select id="idFont" data-font-target="id"></select>
              </div>
            </div>
          </div>
        </div>

        <div class="tab-panel" id="tab-logo" role="tabpanel" data-tab-panel="logo">
          <div class="control-section">
            <h2>ロゴ選択</h2>
            <div class="category-tabs" id="logoCategories" aria-label="ロゴカテゴリ"></div>
            <div class="logo-grid" id="logoGrid"></div>
          </div>
        </div>

        <div class="panel-actions" aria-label="保存と初期化">
          <button id="downloadPng" type="button">PNG保存</button>
          <button id="downloadSvg" class="secondary" type="button">SVG保存</button>
          <button id="resetSettings" class="secondary wide" type="button">設定を初期化</button>
        </div>
        <p class="note">保存画像は選択中の比率で書き出します。GitHub Pages上では選択ロゴをSVG内に埋め込んでからPNG化します。</p>
      </section>

      <section class="preview-panel" aria-label="名刺プレビュー">
        <div class="preview-head">
          <h2>プレビュー</h2>
          <div class="preview-size" id="previewSize">1496 x 2800</div>
        </div>
        <div class="preview-scroll">
          <article class="business-card" id="businessCard" data-ratio="sample">
            <div class="card-inner">
              <div class="logo-wrap" id="logoWrap">
                <img id="logoImage" alt="">
              </div>
              <div class="brand-text" data-text="brand">グレゴリオ製菓</div>
              <div class="tagline" data-text="tagline">Sweet times with Gregorio</div>
              <div class="person-id" data-text="id">ID: 128091</div>
              <div class="school" data-text="school">S.C.H.A.L.E</div>
              <div class="person-name" data-text="name">先生名</div>
            </div>
          </article>
        </div>
      </section>
    </div>
  </main>

  <div class="export-host" id="exportHost" aria-hidden="true"></div>

  <script>
    const logoFiles = [
      "cake-ornate-01.png", "cake-ornate-02.png", "cake-ornate-03.png", "cake-ornate-04.png",
      "cake-ornate-05.png", "cake-ornate-06.png", "cake-ornate-07.png", "cake-ornate-08.png",
      "cake-ornate-09.png", "cake-ornate-10.png", "cake-ornate-11.png", "cake-ornate-12.png",
      "cake-simple-regenerated-01.png", "cake-simple-regenerated-02.png", "cake-simple-regenerated-03.png", "cake-simple-regenerated-04.png",
      "cake-simple-regenerated-05.png", "cake-simple-regenerated-06.png", "cake-simple-regenerated-07.png", "cake-simple-regenerated-08.png",
      "cake-simple-regenerated-09.png", "cake-simple-regenerated-10.png", "cake-simple-regenerated-11.png", "cake-simple-regenerated-12.png",
      "ornate-01.png", "ornate-02.png", "ornate-03.png", "ornate-04.png",
      "ornate-05.png", "ornate-06.png", "ornate-07.png", "ornate-08.png",
      "ornate-09.png", "ornate-10.png", "ornate-11.png", "ornate-12.png",
      "shiki-logo.png",
      "simple-01.png", "simple-02.png", "simple-03.png", "simple-04.png",
      "simple-05.png", "simple-06.png", "simple-07.png", "simple-08.png",
      "simple-09.png", "simple-10.png", "simple-11.png", "simple-12.png"
    ];

    const fontOptions = [
      { label: "Noto Serif JP", value: "Noto Serif JP" },
      { label: "Noto Sans JP", value: "Noto Sans JP" },
      { label: "BIZ UDP明朝", value: "BIZ UDP明朝" },
      { label: "BIZ UD明朝", value: "BIZ UD明朝" },
      { label: "Yu Mincho", value: "Yu Mincho" },
      { label: "MS Mincho", value: "ＭＳ 明朝" },
      { label: "BIZ UDPゴシック", value: "BIZ UDPゴシック" },
      { label: "Yu Gothic", value: "Yu Gothic" },
      { label: "Bodoni Moda SC", value: "Bodoni Moda SC" },
      { label: "Inter", value: "Inter" },
      { label: "Times New Roman", value: "Times New Roman" },
      { label: "Georgia", value: "Georgia" },
      { label: "serif", value: "serif" },
      { label: "sans-serif", value: "sans-serif" }
    ];

    const ratioSpecs = {
      sample: { width: 1496, height: 2800, label: "1496 x 2800" },
      standard: { width: 1100, height: 1820, label: "1100 x 1820" }
    };

    const logoCategories = [
      { id: "all", label: "すべて", test: () => true },
      { id: "simple", label: "シンプル", test: (file) => file.startsWith("simple-") },
      { id: "cake-simple", label: "ケーキ simple", test: (file) => file.startsWith("cake-simple-") },
      { id: "cake-rich", label: "ケーキ rich", test: (file) => file.startsWith("cake-ornate-") },
      { id: "ornate", label: "旧 ornate", test: (file) => file.startsWith("ornate-") },
      { id: "extra", label: "追加", test: (file) => file === "shiki-logo.png" }
    ];

    const defaultState = {
      ratio: "sample",
      logoVisible: "show",
      logoSize: "206",
      logoX: "0",
      logoY: "0",
      brand: "グレゴリオ製菓",
      tagline: "Sweet times with Gregorio",
      school: "S.C.H.A.L.E",
      name: "先生名",
      id: "ID: 128091",
      brandFont: "Noto Serif JP",
      taglineFont: "Times New Roman",
      schoolFont: "Bodoni Moda SC",
      nameFont: "Noto Serif JP",
      idFont: "Times New Roman",
      logo: "shiki-logo.png"
    };

    const fields = {
      ratio: document.querySelector("#ratioSelect"),
      logoVisible: document.querySelector("#logoVisible"),
      logoSize: document.querySelector("#logoSize"),
      logoX: document.querySelector("#logoX"),
      logoY: document.querySelector("#logoY"),
      brand: document.querySelector("#brandText"),
      tagline: document.querySelector("#taglineText"),
      school: document.querySelector("#schoolText"),
      name: document.querySelector("#nameText"),
      id: document.querySelector("#idText"),
      brandFont: document.querySelector("#brandFont"),
      taglineFont: document.querySelector("#taglineFont"),
      schoolFont: document.querySelector("#schoolFont"),
      nameFont: document.querySelector("#nameFont"),
      idFont: document.querySelector("#idFont")
    };

    const card = document.querySelector("#businessCard");
    const logoGrid = document.querySelector("#logoGrid");
    const logoCategoriesNode = document.querySelector("#logoCategories");
    const logoImage = document.querySelector("#logoImage");
    const logoWrap = document.querySelector("#logoWrap");
    const previewSize = document.querySelector("#previewSize");
    let selectedLogo = defaultState.logo;
    let activeLogoCategory = "all";

    function logoPath(file) {
      return `assets/generated/logos/${file}`;
    }

    function fillFontSelects() {
      ["brandFont", "taglineFont", "schoolFont", "nameFont", "idFont"].forEach((id) => {
        fields[id].innerHTML = fontOptions.map((font) => {
          const selected = font.value === defaultState[id] ? " selected" : "";
          return `<option value="${font.value}"${selected}>${font.label}</option>`;
        }).join("");
      });
    }

    function renderLogoGrid() {
      logoGrid.innerHTML = "";
      const category = logoCategories.find((item) => item.id === activeLogoCategory) || logoCategories[0];
      logoFiles.filter(category.test).forEach((file) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "logo-choice";
        button.dataset.logo = file;
        button.setAttribute("aria-label", file.replace(".png", ""));
        button.innerHTML = `<div class="logo-thumb"><img src="${logoPath(file)}" alt=""></div>`;
        logoGrid.append(button);
      });
      syncLogoSelection();
    }

    function renderLogoCategories() {
      logoCategoriesNode.innerHTML = "";
      logoCategories.forEach((category) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "category-button";
        button.dataset.logoCategory = category.id;
        button.textContent = category.label;
        logoCategoriesNode.append(button);
      });
      syncLogoCategories();
    }

    function syncLogoCategories() {
      document.querySelectorAll("[data-logo-category]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.logoCategory === activeLogoCategory);
      });
    }

    function syncLogoSelection() {
      document.querySelectorAll(".logo-choice").forEach((button) => {
        button.classList.toggle("is-selected", button.dataset.logo === selectedLogo);
      });
    }

    function setText(key, fallback) {
      const value = fields[key].value.trim() || fallback;
      document.querySelector(`[data-text="${key}"]`).textContent = value;
    }

    function syncPreview() {
      const spec = ratioSpecs[fields.ratio.value];
      card.dataset.ratio = fields.ratio.value;
      previewSize.textContent = spec.label;
      card.style.setProperty("--logo-size", `${fields.logoSize.value}px`);
      card.style.setProperty("--logo-x", `${fields.logoX.value}px`);
      card.style.setProperty("--logo-y", `${fields.logoY.value}px`);
      card.style.setProperty("--brand-font", `"${fields.brandFont.value}"`);
      card.style.setProperty("--tagline-font", `"${fields.taglineFont.value}"`);
      card.style.setProperty("--school-font", `"${fields.schoolFont.value}"`);
      card.style.setProperty("--name-font", `"${fields.nameFont.value}"`);
      card.style.setProperty("--id-font", `"${fields.idFont.value}"`);
      logoImage.src = logoPath(selectedLogo);
      logoWrap.style.display = fields.logoVisible.value === "show" ? "grid" : "none";
      setText("brand", defaultState.brand);
      setText("tagline", defaultState.tagline);
      setText("school", defaultState.school);
      setText("name", defaultState.name);
      setText("id", defaultState.id);
      syncLogoSelection();
    }

    function resetSettings() {
      fields.ratio.value = defaultState.ratio;
      fields.logoVisible.value = defaultState.logoVisible;
      fields.logoSize.value = defaultState.logoSize;
      fields.logoX.value = defaultState.logoX;
      fields.logoY.value = defaultState.logoY;
      fields.brand.value = defaultState.brand;
      fields.tagline.value = defaultState.tagline;
      fields.school.value = defaultState.school;
      fields.name.value = defaultState.name;
      fields.id.value = defaultState.id;
      fields.brandFont.value = defaultState.brandFont;
      fields.taglineFont.value = defaultState.taglineFont;
      fields.schoolFont.value = defaultState.schoolFont;
      fields.nameFont.value = defaultState.nameFont;
      fields.idFont.value = defaultState.idFont;
      selectedLogo = defaultState.logo;
      syncPreview();
    }

    function escapeXml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function imageToDataUrl(src) {
      try {
        const response = await fetch(src);
        const blob = await response.blob();
        return await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      } catch (error) {
        return await new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = image.naturalWidth;
            canvas.height = image.naturalHeight;
            canvas.getContext("2d").drawImage(image, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          };
          image.onerror = reject;
          image.src = src;
        });
      }
    }

    function textStyle(font, size, weight, fill = "#141414") {
      return `font-family:'${font}', 'Noto Serif JP', serif;font-size:${size}px;font-weight:${weight};fill:${fill};text-anchor:middle;dominant-baseline:middle`;
    }

    async function svgMarkup() {
      await waitForFonts();
      const spec = ratioSpecs[fields.ratio.value];
      const sx = spec.width / 748;
      const sy = spec.height / 1400;
      const scale = Math.min(sx, sy);
      const logoSize = Number(fields.logoSize.value) * scale;
      const logoX = Number(fields.logoX.value) * sx;
      const logoY = Number(fields.logoY.value) * sy;
      const logoHref = fields.logoVisible.value === "show" ? await imageToDataUrl(logoPath(selectedLogo)) : "";
      const centerX = spec.width / 2;
      const logoCenterX = centerX + logoX;
      const logoCenterY = spec.height * 0.192 + logoY;
      const paper = `
        <defs>
          <linearGradient id="paperLight" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#fbfaf8"/>
            <stop offset="0.48" stop-color="#f2f1ee"/>
            <stop offset="1" stop-color="#eceae7"/>
          </linearGradient>
          <pattern id="paperLines" width="${12 * scale}" height="${14 * scale}" patternUnits="userSpaceOnUse" patternTransform="rotate(31)">
            <rect width="${12 * scale}" height="${14 * scale}" fill="transparent"/>
            <path d="M0 0 H${12 * scale}" stroke="#81766b" stroke-opacity="0.055" stroke-width="${1 * scale}"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#paperLight)"/>
        <circle cx="${spec.width * 0.28}" cy="${spec.height * 0.18}" r="${spec.width * 0.34}" fill="#fff" opacity="0.28"/>
        <circle cx="${spec.width * 0.72}" cy="${spec.height * 0.58}" r="${spec.width * 0.3}" fill="#cbc8c2" opacity="0.18"/>
        <rect width="100%" height="100%" fill="url(#paperLines)" opacity="0.5"/>
      `;
      const logo = logoHref ? `<image href="${logoHref}" x="${logoCenterX - logoSize / 2}" y="${logoCenterY - logoSize / 2}" width="${logoSize}" height="${logoSize}" preserveAspectRatio="xMidYMid meet"/>` : "";
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${spec.width}" height="${spec.height}" viewBox="0 0 ${spec.width} ${spec.height}">
        ${paper}
        ${logo}
        <text x="${centerX}" y="${spec.height * 0.457}" style="${textStyle(fields.brandFont.value, 50 * scale, 700, "#4a4a4a")}">${escapeXml(fields.brand.value.trim() || defaultState.brand)}</text>
        <text x="${centerX}" y="${spec.height * 0.539}" style="${textStyle(fields.taglineFont.value, 28 * scale, 500)}">${escapeXml(fields.tagline.value.trim() || defaultState.tagline)}</text>
        <text x="${centerX}" y="${spec.height * 0.793}" style="${textStyle(fields.schoolFont.value, 36 * scale, 700, "#565656")}">${escapeXml(fields.school.value.trim() || defaultState.school)}</text>
        <text x="${centerX}" y="${spec.height * 0.848}" style="${textStyle(fields.nameFont.value, 58 * scale, 900)}">${escapeXml(fields.name.value.trim() || defaultState.name)}</text>
        <text x="${centerX}" y="${spec.height * 0.597}" style="${textStyle(fields.idFont.value, 33 * scale, 600)}">${escapeXml(fields.id.value.trim() || defaultState.id)}</text>
      </svg>`;
    }

    function downloadBlob(content, type, filename) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    async function waitForFonts() {
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
    }

    function fileBaseName() {
      const safeName = (fields.name.value.trim() || "teacher").replace(/[\\/:*?"<>|]/g, "_");
      return `gregorio-card-${safeName}-${fields.ratio.value}`;
    }

    async function downloadSvg() {
      downloadBlob(await svgMarkup(), "image/svg+xml;charset=utf-8", `${fileBaseName()}.svg`);
    }

    async function downloadPng() {
      const spec = ratioSpecs[fields.ratio.value];
      const markup = await svgMarkup();
      const url = URL.createObjectURL(new Blob([markup], { type: "image/svg+xml;charset=utf-8" }));
      const image = new Image();
      image.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = spec.width;
        canvas.height = spec.height;
        canvas.getContext("2d").drawImage(image, 0, 0);
        URL.revokeObjectURL(url);
        canvas.toBlob((blob) => {
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = `${fileBaseName()}.png`;
          link.click();
          URL.revokeObjectURL(link.href);
        }, "image/png");
      };
      image.src = url;
    }

    fillFontSelects();
    renderLogoCategories();
    renderLogoGrid();
    syncPreview();

    document.querySelectorAll("[data-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        const tab = button.dataset.tab;
        document.querySelectorAll("[data-tab]").forEach((tabButton) => {
          const isActive = tabButton.dataset.tab === tab;
          tabButton.classList.toggle("is-active", isActive);
          tabButton.setAttribute("aria-selected", String(isActive));
        });
        document.querySelectorAll("[data-tab-panel]").forEach((panel) => {
          panel.classList.toggle("is-active", panel.dataset.tabPanel === tab);
        });
      });
    });

    document.querySelectorAll("input, select").forEach((field) => {
      field.addEventListener("input", syncPreview);
      field.addEventListener("change", syncPreview);
    });

    logoGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-logo]");
      if (!button) {
        return;
      }
      selectedLogo = button.dataset.logo;
      syncPreview();
    });

    logoCategoriesNode.addEventListener("click", (event) => {
      const button = event.target.closest("[data-logo-category]");
      if (!button) {
        return;
      }
      activeLogoCategory = button.dataset.logoCategory;
      syncLogoCategories();
      renderLogoGrid();
    });

    document.querySelector("#downloadSvg").addEventListener("click", downloadSvg);
    document.querySelector("#downloadPng").addEventListener("click", downloadPng);
    document.querySelector("#resetSettings").addEventListener("click", resetSettings);
  </script>
</body>
</html>
