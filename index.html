<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>グレゴリオ製菓 名刺テンプレート再設計</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;850&family=Noto+Sans+JP:wght@400;500;700;850&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #24242b;
      --muted: #6f7280;
      --paper: #fbf7ee;
      --ivory: #fffdf8;
      --lavender: #eee8f6;
      --violet: #4b3a63;
      --navy: #1f2b42;
      --gold: #b9964b;
      --biscuit: #d6b581;
      --line: #ded3bd;
      --shadow: 0 18px 48px rgba(34, 31, 42, 0.14);
      --font-ui: "Noto Sans JP", "Segoe UI", sans-serif;
      --font-serif: "Noto Serif JP", "Yu Mincho", serif;
      --font-latin: "Inter", "Segoe UI", sans-serif;
      font-family: var(--font-ui);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #f6f0e7;
      min-height: 100vh;
    }

    main {
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(27px, 4vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .pill {
      flex: 0 0 auto;
      border: 1px solid rgba(75, 58, 99, 0.2);
      background: rgba(255, 253, 248, 0.85);
      border-radius: 999px;
      color: var(--violet);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      text-decoration: none;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(280px, 330px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .panel,
    .selected-panel,
    .template-frame {
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(222, 211, 189, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
      position: sticky;
      top: 14px;
    }

    .panel h2,
    .selected-panel h2 {
      margin: 0 0 14px;
      font-size: 17px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    label {
      color: #3e4350;
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid #cfc3aa;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      padding: 10px 11px;
    }

    input:focus {
      outline: 2px solid rgba(75, 58, 99, 0.18);
      border-color: var(--violet);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      padding: 9px 12px;
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid #cfc3aa;
    }

    .note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .preview-area {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .selected-panel {
      padding: 16px;
    }

    .selected-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
    }

    #selectedConcept {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .selected-canvas {
      overflow: auto;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
    }

    .selected-canvas .card {
      width: min(100%, 960px);
      min-width: 620px;
      margin: 0 auto;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .template-frame {
      padding: 12px;
      display: grid;
      gap: 10px;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    .template-frame.is-selected {
      border-color: var(--violet);
      transform: translateY(-2px);
    }

    .template-meta {
      display: grid;
      gap: 5px;
    }

    .template-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 800;
    }

    .template-title button {
      min-height: 34px;
      padding: 6px 10px;
      font-size: 13px;
      white-space: nowrap;
    }

    .template-copy {
      min-height: 36px;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .card {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      container-type: inline-size;
      color: var(--card-ink);
      background: var(--card-bg);
      border: 1px solid var(--card-line);
      isolation: isolate;
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .brand {
      font-family: var(--font-serif);
      font-size: clamp(16px, 4.6cqw, 30px);
      font-weight: 700;
      letter-spacing: 0;
    }

    .teacher {
      font-size: clamp(28px, 8.2cqw, 58px);
      line-height: 1.04;
      font-weight: 850;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .label {
      display: block;
      color: var(--label-color);
      font-family: var(--font-latin);
      font-size: clamp(8px, 2cqw, 11px);
      font-weight: 700;
      margin-bottom: 0.25em;
    }

    .value {
      display: block;
      font-size: clamp(11px, 2.9cqw, 16px);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .logo-slot {
      display: grid;
      place-items: center;
      width: clamp(58px, 17cqw, 116px);
      aspect-ratio: 1;
      border-radius: 32%;
      background:
        radial-gradient(circle at 42% 36%, rgba(255,255,255,0.9), transparent 22%),
        linear-gradient(145deg, #e3bf80, #f4dfb5 55%, #b98f4c);
      box-shadow: inset 0 0 0 1px rgba(84, 59, 35, 0.18), 0 10px 22px rgba(46, 33, 23, 0.12);
    }

    .logo-slot::before {
      content: "";
      width: 72%;
      height: 19%;
      border: clamp(4px, 1.2cqw, 8px) solid #6fbde0;
      border-radius: 999px;
      transform: translateY(-118%);
      background: rgba(255,255,255,0.08);
    }

    .minimal {
      --card-bg: #fffdf8;
      --card-ink: #252631;
      --card-line: #e3d8c3;
      --label-color: #77727a;
    }

    .minimal .inner {
      position: absolute;
      inset: 10%;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto 1fr auto;
      gap: 8%;
    }

    .minimal .brand {
      align-self: start;
    }

    .minimal .logo-slot {
      grid-row: 1 / span 2;
      grid-column: 2;
      align-self: start;
    }

    .minimal .teacher {
      align-self: center;
      grid-column: 1 / span 2;
    }

    .minimal .meta {
      grid-column: 1 / span 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8%;
    }

    .patisserie {
      --card-bg: #fbf1df;
      --card-ink: #372f2a;
      --card-line: #dac199;
      --label-color: #8c7255;
    }

    .patisserie::before {
      inset: 7%;
      border: 1px solid rgba(185, 143, 76, 0.34);
      border-radius: 5px;
    }

    .patisserie .inner {
      position: absolute;
      inset: 10%;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto 1fr auto;
      column-gap: 8%;
      row-gap: 8%;
      align-items: center;
    }

    .patisserie .logo-slot {
      grid-row: 1 / span 3;
      border-radius: 50%;
    }

    .patisserie .teacher {
      font-family: var(--font-serif);
      font-weight: 700;
    }

    .patisserie .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6%;
    }

    .mystic {
      --card-bg: #f7f4fb;
      --card-ink: #271f34;
      --card-line: #d5cce4;
      --label-color: #6d6179;
    }

    .mystic::before {
      width: 42%;
      height: 120%;
      right: -18%;
      top: -10%;
      background: rgba(75, 58, 99, 0.08);
      transform: rotate(14deg);
    }

    .mystic::after {
      left: 8%;
      right: 8%;
      top: 13%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(185, 150, 75, 0.65), transparent);
    }

    .mystic .inner {
      position: absolute;
      inset: 10%;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto 1fr auto;
      gap: 8%;
    }

    .mystic .logo-slot {
      grid-column: 2;
      grid-row: 1 / span 2;
      background:
        radial-gradient(circle at 42% 36%, rgba(255,255,255,0.9), transparent 22%),
        linear-gradient(145deg, #d7c2e8, #f6edf9 55%, #b9964b);
    }

    .mystic .teacher {
      grid-column: 1 / span 2;
      align-self: center;
      font-family: var(--font-serif);
      font-weight: 700;
    }

    .mystic .meta {
      grid-column: 1 / span 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8%;
    }

    .export-host {
      position: fixed;
      left: -200vw;
      top: 0;
      width: 1600px;
      height: 900px;
      pointer-events: none;
    }

    .export-host .card {
      width: 1600px;
      height: 900px;
      border-radius: 0;
    }

    @media (max-width: 1020px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }

      .gallery {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      main {
        width: min(100% - 18px, 620px);
        padding-top: 18px;
      }

      .topbar {
        display: grid;
      }

      .pill {
        width: fit-content;
      }

      .selected-canvas .card {
        min-width: 560px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>グレゴリオ製菓 名刺テンプレート再設計</h1>
        <p class="subtitle">装飾案の比較ではなく、実用的な名刺として読める3案に絞ったページ。</p>
      </div>
      <a class="pill" href="logos.html">旧ロゴ試作を見る</a>
    </div>

    <div class="workspace">
      <section class="panel" aria-labelledby="edit-title">
        <h2 id="edit-title">共通入力</h2>
        <div class="field">
          <label for="teacherName">先生名</label>
          <input id="teacherName" maxlength="28" value="先生名">
        </div>
        <div class="field">
          <label for="accountName">アカウント名</label>
          <input id="accountName" maxlength="32" value="@account_name">
        </div>
        <div class="field">
          <label for="circleId">サークルID</label>
          <input id="circleId" maxlength="24" value="000000">
        </div>
        <div class="actions">
          <button id="downloadPng">選択案をPNG保存</button>
          <button id="downloadSvg" class="secondary">SVG保存</button>
        </div>
        <p class="note">ロゴは画像生成で作る最終候補に差し替える前提の仮スロットです。名刺本体は、文字の正確さと名前差し替えを優先してHTML/CSSで管理します。</p>
      </section>

      <section class="preview-area" aria-label="名刺テンプレート案">
        <section class="selected-panel" aria-labelledby="selected-title">
          <div class="selected-head">
            <div>
              <h2 id="selected-title">選択中: <span id="selectedName"></span></h2>
              <p id="selectedConcept"></p>
            </div>
          </div>
          <div class="selected-canvas" id="selectedCanvas"></div>
        </section>

        <div class="gallery" id="gallery"></div>
      </section>
    </div>
  </main>

  <div class="export-host" id="exportHost" aria-hidden="true"></div>

  <template id="cardTemplate">
    <article class="card">
      <div class="inner">
        <div class="brand">グレゴリオ製菓</div>
        <div class="logo-slot" aria-hidden="true"></div>
        <div class="teacher" data-field="teacherName">先生名</div>
        <div class="meta">
          <div>
            <span class="label">ACCOUNT</span>
            <span class="value" data-field="accountName">@account_name</span>
          </div>
          <div>
            <span class="label">CIRCLE ID</span>
            <span class="value" data-field="circleId">000000</span>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script>
    const templates = [
      {
        id: "minimal",
        name: "Minimal",
        concept: "余白と可読性を最優先。最終ロゴが多少強くても名刺全体が崩れにくい案。"
      },
      {
        id: "patisserie",
        name: "Patisserie",
        concept: "アイボリーと焼き菓子色。製菓店らしさを控えめに出す案。"
      },
      {
        id: "mystic",
        name: "Mystic",
        concept: "淡紫と金を少量だけ使い、神秘感を足す案。荘厳にしすぎない。"
      }
    ];

    const fields = {
      teacherName: document.querySelector("#teacherName"),
      accountName: document.querySelector("#accountName"),
      circleId: document.querySelector("#circleId")
    };

    const gallery = document.querySelector("#gallery");
    const template = document.querySelector("#cardTemplate");
    const selectedCanvas = document.querySelector("#selectedCanvas");
    const selectedName = document.querySelector("#selectedName");
    const selectedConcept = document.querySelector("#selectedConcept");
    const exportHost = document.querySelector("#exportHost");
    let selectedId = templates[0].id;

    function cardNode(item) {
      const fragment = template.content.cloneNode(true);
      const card = fragment.querySelector(".card");
      card.classList.add(item.id);
      card.dataset.template = item.id;
      return card;
    }

    function renderGallery() {
      gallery.innerHTML = "";
      templates.forEach((item) => {
        const frame = document.createElement("section");
        frame.className = "template-frame";
        frame.dataset.template = item.id;
        frame.innerHTML = `
          <div class="template-meta">
            <div class="template-title">
              <span>${item.name}</span>
              <button type="button" data-select="${item.id}">選択</button>
            </div>
            <p class="template-copy">${item.concept}</p>
          </div>
        `;
        frame.prepend(cardNode(item));
        gallery.append(frame);
      });
    }

    function setText(target, value, fallback) {
      target.textContent = value.trim() || fallback;
    }

    function syncAllCards() {
      document.querySelectorAll("[data-field='teacherName']").forEach((node) => setText(node, fields.teacherName.value, "先生名"));
      document.querySelectorAll("[data-field='accountName']").forEach((node) => setText(node, fields.accountName.value, "@account_name"));
      document.querySelectorAll("[data-field='circleId']").forEach((node) => setText(node, fields.circleId.value, "000000"));
    }

    function updateSelected() {
      const item = templates.find((templateItem) => templateItem.id === selectedId);
      selectedName.textContent = item.name;
      selectedConcept.textContent = item.concept;
      selectedCanvas.innerHTML = "";
      selectedCanvas.append(cardNode(item));
      document.querySelectorAll(".template-frame").forEach((frame) => {
        frame.classList.toggle("is-selected", frame.dataset.template === selectedId);
      });
      syncAllCards();
    }

    function cloneForExport() {
      const item = templates.find((templateItem) => templateItem.id === selectedId);
      exportHost.innerHTML = "";
      exportHost.append(cardNode(item));
      syncAllCards();
      return exportHost.querySelector(".card");
    }

    function svgMarkup() {
      const source = cloneForExport();
      const clone = source.cloneNode(true);
      const sourceNodes = [source, ...source.querySelectorAll("*")];
      const cloneNodes = [clone, ...clone.querySelectorAll("*")];
      const css = Array.from(document.styleSheets)
        .map((sheet) => {
          try {
            return Array.from(sheet.cssRules).map((rule) => rule.cssText).join("\n");
          } catch (error) {
            return "";
          }
        })
        .join("\n");
      sourceNodes.forEach((node, index) => {
        const computed = getComputedStyle(node);
        cloneNodes[index].setAttribute("style", Array.from(computed).map((key) => `${key}:${computed.getPropertyValue(key)}`).join(";"));
      });
      const html = new XMLSerializer().serializeToString(clone);
      return `<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
        <foreignObject width="1600" height="900">
          <div xmlns="http://www.w3.org/1999/xhtml" style="width:1600px;height:900px;">
            <style><![CDATA[${css}]]></style>
            ${html}
          </div>
        </foreignObject>
      </svg>`;
    }

    function fileBaseName() {
      const safeName = (fields.teacherName.value.trim() || "teacher").replace(/[\\/:*?"<>|]/g, "_");
      return `gregorio-card-${selectedId}-${safeName}`;
    }

    function downloadBlob(content, type, filename) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    async function waitForFonts() {
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
    }

    async function downloadSvg() {
      await waitForFonts();
      downloadBlob(svgMarkup(), "image/svg+xml;charset=utf-8", `${fileBaseName()}.svg`);
    }

    async function downloadPng() {
      await waitForFonts();
      const image = new Image();
      const url = URL.createObjectURL(new Blob([svgMarkup()], { type: "image/svg+xml;charset=utf-8" }));
      image.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = 1600;
        canvas.height = 900;
        canvas.getContext("2d").drawImage(image, 0, 0);
        URL.revokeObjectURL(url);
        canvas.toBlob((blob) => {
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = `${fileBaseName()}.png`;
          link.click();
          URL.revokeObjectURL(link.href);
        }, "image/png");
      };
      image.src = url;
    }

    renderGallery();
    updateSelected();

    Object.values(fields).forEach((field) => {
      field.addEventListener("input", syncAllCards);
    });

    gallery.addEventListener("click", (event) => {
      const button = event.target.closest("[data-select]");
      if (button) {
        selectedId = button.dataset.select;
        updateSelected();
      }
    });

    document.querySelector("#downloadSvg").addEventListener("click", downloadSvg);
    document.querySelector("#downloadPng").addEventListener("click", downloadPng);
  </script>
</body>
</html>
